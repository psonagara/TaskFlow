<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board — TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/x-icon" href="./image/taskflow.png">
  <style>
    .board-col {
      min-height: calc(100vh - 280px);
    }

    .task-card {
      cursor: grab;
      user-select: none;
    }

    .task-card:active {
      cursor: grabbing;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <div id="app"></div>

  <!-- Task Modal -->
  <div id="task-modal"
    class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto modal-card">
      <div
        class="flex items-center justify-between px-6 py-4 border-b border-slate-100 sticky top-0 bg-white rounded-t-2xl z-10">
        <h2 class="font-bold text-slate-800 text-lg" id="task-modal-title">Create Task</h2>
        <button id="task-modal-close" class="p-2 rounded-xl hover:bg-slate-100 text-slate-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <form id="task-form" class="p-6 space-y-4" novalidate>
        <input type="hidden" id="task-id" />
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Title <span
              class="text-red-500">*</span></label>
          <input type="text" id="task-title" placeholder="Task title..."
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all" />
          <p class="text-red-500 text-xs mt-1 hidden" id="task-title-err">Title is required.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
          <textarea id="task-desc" rows="3" placeholder="What needs to be done?"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Priority</label>
            <select id="task-priority"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all bg-white">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
            <select id="task-status"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all bg-white">
              <option value="TODO">TODO</option>
              <option value="IN_PROGRESS">In Progress</option>
              <option value="IN_REVIEW">In Review</option>
              <option value="DONE">Done</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Assign To</label>
            <select id="task-assignee"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all bg-white">
              <option value="">Unassigned</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Due Date</label>
            <input type="date" id="task-due"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all" />
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="task-modal-cancel"
            class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</button>
          <button type="submit" id="task-submit"
            class="flex-1 px-4 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold transition-colors">
            Create Task
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div id="detail-modal"
    class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto modal-card"
      id="detail-content">
      <!-- Loaded dynamically -->
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error("unauth");

    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get("projectId");
    if (!projectId) { window.location.href = "projects.html"; }

    const { sidebarHtml, topbarHtml } = renderLayout("projects");

    const COLUMNS = [
      { id: "TODO", label: "To Do", color: "text-slate-600", dot: "bg-slate-400", header: "bg-slate-50 border-slate-200" },
      { id: "IN_PROGRESS", label: "In Progress", color: "text-blue-700", dot: "bg-blue-500", header: "bg-blue-50 border-blue-200" },
      { id: "IN_REVIEW", label: "In Review", color: "text-violet-700", dot: "bg-violet-500", header: "bg-violet-50 border-violet-200" },
      { id: "DONE", label: "Done", color: "text-emerald-700", dot: "bg-emerald-500", header: "bg-emerald-50 border-emerald-200" },
    ];

    $("#app").html(`
      ${sidebarHtml}
      <div class="lg:ml-64 flex flex-col min-h-screen">
        ${topbarHtml}
        <main class="flex-1 p-4 lg:p-6 overflow-x-auto">
          <!-- Header -->
          <div class="flex flex-wrap items-center gap-4 mb-6 fade-in">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 text-sm text-slate-400 mb-1">
                <a href="projects.html" class="hover:text-blue-600 transition-colors">Projects</a>
                <span>/</span>
                <span class="text-slate-600 font-medium" id="project-name">Loading...</span>
              </div>
              <h1 class="text-2xl font-bold text-slate-800">Project Board</h1>
            </div>
            <button id="create-task-btn" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition-all shadow-md shadow-blue-600/20">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Add Task
            </button>
          </div>

          <!-- Filters -->
          <div class="flex flex-wrap gap-3 mb-6 bg-white border border-slate-100 rounded-2xl p-3 shadow-sm fade-in">
            <div class="relative flex-1 min-w-[180px]">
              <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="text" id="search-tasks" placeholder="Search tasks..." class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2 text-sm focus:border-blue-400 transition-all" />
            </div>
            <select id="filter-priority" class="border border-slate-200 rounded-xl px-4 py-2 text-sm focus:border-blue-400 transition-all bg-white">
              <option value="">All Priorities</option>
              <option value="HIGH">High</option>
              <option value="MEDIUM">Medium</option>
              <option value="LOW">Low</option>
            </select>
            <select id="filter-user" class="border border-slate-200 rounded-xl px-4 py-2 text-sm focus:border-blue-400 transition-all bg-white">
              <option value="">All Users</option>
            </select>
          </div>

          <!-- Kanban Board -->
          <div class="flex gap-4 pb-6 board-scroll" style="min-width: 900px;">
            ${COLUMNS.map(col => `
              <div class="flex-1 min-w-[220px]">
                <div class="flex items-center gap-2 mb-3 px-1">
                  <span class="w-2.5 h-2.5 rounded-full ${col.dot} flex-shrink-0"></span>
                  <h3 class="text-sm font-bold ${col.color} uppercase tracking-wider">${col.label}</h3>
                  <span class="ml-auto text-xs font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full col-count" id="count-${col.id}">0</span>
                </div>
                <div class="kanban-col p-3 rounded-2xl border-2 border-dashed border-slate-200 space-y-3 board-col" id="col-${col.id}" data-status="${col.id}">
                  <div class="animate-pulse space-y-3">
                    <div class="h-24 bg-white rounded-xl border border-slate-100 shadow-sm"></div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </main>
      </div>
    `);

    initSidebar();
    initUserNav();

    let allTasks = [];
    let projectMembers = [];

    // Load project info
    API.get("/projects/" + projectId).then(function (p) {
      p = p.content;
      $("#project-name").text(p.name || "Project");
      document.title = (p.name || "Board") + " — TaskFlow";
    }).catch(() => { });

    // Load members for filter
    API.get("/projects/" + projectId + "/members").then(function (members) {
      members = members.content.members;
      projectMembers = members || [];
      members.forEach(m => {
        $("#filter-user, #task-assignee").append(`<option value="${m.id}">${m.name || m.email}</option>`);
      });
    }).catch(() => {
      // fallback: just show unassigned
    });

    function loadTasks() {
      API.get("/tasks", { projectId }).then(function (res) {
        allTasks = res.content.tasksList || res || [];
        applyFilters();
      }).catch(() => {
        COLUMNS.forEach(c => $(`#col-${c.id}`).html(emptyState("Failed to load", "")));
      });
    }

    function applyFilters() {
      const search = $("#search-tasks").val().toLowerCase();
      const priority = $("#filter-priority").val();
      const user = $("#filter-user").val();

      let filtered = allTasks.filter(t => {
        if (search && !(t.title || "").toLowerCase().includes(search)) return false;
        if (priority && t.priority !== priority) return false;
        if (user && String(t.assignedTo?.id) !== String(user)) return false;
        return true;
      });

      COLUMNS.forEach(col => {
        const tasks = filtered.filter(t => t.status === col.id);
        $(`#count-${col.id}`).text(tasks.length);
        const $col = $(`#col-${col.id}`).empty();
        if (!tasks.length) {
          $col.html(`<div class="text-center py-8 text-slate-300 text-sm">No tasks</div>`);
          return;
        }
        tasks.forEach(t => $col.append(renderTaskCard(t)));
      });

      initDragDrop();
    }

    function renderTaskCard(t) {
      const overdue = isOverdue(t.dueDate) && t.status !== "DONE";
      const assigneeName = t.assignedTo ? (t.assignedTo.name || t.assignedTo.email || "?") : null;
      const assigneeInitials = assigneeName ? assigneeName.substring(0, 2).toUpperCase() : null;
      return `
        <div class="task-card bg-white rounded-xl border border-slate-100 shadow-sm p-4 hover:shadow-md hover:-translate-y-0.5 transition-all duration-150 fade-in" data-id="${t.id}" data-status="${t.status}" draggable="true">
          <div class="flex items-start justify-between gap-2 mb-3">
            <p class="text-sm font-semibold text-slate-800 leading-snug flex-1">${t.title || "Untitled"}</p>
            ${priorityBadge(t.priority)}
          </div>
          ${t.description ? `<p class="text-xs text-slate-400 mb-3 line-clamp-2 leading-relaxed">${t.description}</p>` : ""}
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              ${assigneeName ? `<div class="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-white text-[10px] font-bold" title="${assigneeName}">${assigneeInitials}</div>` : `<div class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-slate-400 text-[10px]">?</div>`}
              ${t.dueDate ? `<span class="text-xs ${overdue ? "text-red-500 font-semibold" : "text-slate-400"} flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>${formatDate(t.dueDate)}</span>` : ""}
            </div>
            <button class="view-task-btn text-slate-300 hover:text-blue-500 transition-colors p-1 rounded-lg hover:bg-blue-50" data-id="${t.id}">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>
      `;
    }

    // Drag & Drop
    function initDragDrop() {
      let draggedId = null;

      $(document).off("dragstart.kanban dragover.kanban drop.kanban dragend.kanban");

      $(document).on("dragstart.kanban", ".task-card", function (e) {
        draggedId = $(this).data("id");
        $(this).addClass("opacity-40");
        e.originalEvent.dataTransfer.effectAllowed = "move";
      });

      $(document).on("dragend.kanban", ".task-card", function () {
        $(this).removeClass("opacity-40");
        $(".kanban-col").removeClass("drag-over");
      });

      $(document).on("dragover.kanban", ".kanban-col", function (e) {
        e.preventDefault();
        $(".kanban-col").removeClass("drag-over");
        $(this).addClass("drag-over");
      });

      $(document).on("drop.kanban", ".kanban-col", function (e) {
        e.preventDefault();
        const newStatus = $(this).data("status");
        const card = $(".task-card[data-id='" + draggedId + "']");
        const oldStatus = card.data("status");
        if (newStatus === oldStatus) { $(".kanban-col").removeClass("drag-over"); return; }

        API.put("/tasks/" + draggedId + "/status", { status: newStatus }).then(function () {
          const task = allTasks.find(t => String(t.id) === String(draggedId));
          if (task) task.status = newStatus;
          applyFilters();
          Toast.show("Task moved to " + newStatus.replace("_", " "), "success");
        });
        $(".kanban-col").removeClass("drag-over");
      });

      // View task
      $(document).off("click.viewtask").on("click.viewtask", ".view-task-btn", function (e) {
        e.stopPropagation();
        openTaskDetail($(this).data("id"));
      });
    }

    // Filters
    $("#search-tasks, #filter-priority, #filter-user").on("input change", applyFilters);

    // Create task modal
    $("#create-task-btn").on("click", function () {
      $("#task-modal-title").text("Create Task");
      $("#task-form")[0].reset();
      $("#task-id").val("");
      $("#task-submit").text("Create Task");
      $("#task-modal").removeClass("hidden").addClass("flex");
    });
    $("#task-modal-close, #task-modal-cancel").on("click", () => $("#task-modal").addClass("hidden").removeClass("flex"));
    $("#task-modal").on("click", function (e) { if ($(e.target).is(this)) $(this).addClass("hidden").removeClass("flex"); });

    $("#task-form").on("submit", function (e) {
      e.preventDefault();
      const title = $("#task-title").val().trim();
      if (!title) { $("#task-title-err").removeClass("hidden"); return; }
      $("#task-title-err").addClass("hidden");

      const taskId = $("#task-id").val();
      const payload = {
        title,
        description: $("#task-desc").val().trim(),
        priority: $("#task-priority").val(),
        status: $("#task-status").val(),
        assignedToId: $("#task-assignee").val() || null,
        dueDate: $("#task-due").val() || null,
        projectId: parseInt(projectId),
      };

      const isEdit = !!taskId;
      const req = isEdit ? API.put("/tasks/" + taskId, payload) : API.post("/tasks", payload);

      $("#task-submit").prop("disabled", true).text(isEdit ? "Saving..." : "Creating...");

      req.then(function () {
        Toast.show(isEdit ? "Task updated!" : "Task created!", "success");
        $("#task-modal").addClass("hidden").removeClass("flex");
        loadTasks();
      }).catch(() => { }).always(() => {
        $("#task-submit").prop("disabled", false).text(isEdit ? "Save Changes" : "Create Task");
      });
    });

    // Task Detail
    function openTaskDetail(taskId) {
      $("#detail-modal").removeClass("hidden").addClass("flex");
      $("#detail-content").html(`<div class="flex items-center justify-center py-20"><div class="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div></div>`);

      API.get("/tasks/" + taskId).then(function (task) {
        renderTaskDetail(task.content);
      }).catch(() => {
        $("#detail-content").html(`<div class="p-8">${emptyState("Failed to load task")}</div>`);
      });
    }

    function renderTaskDetail(task) {
      const overdue = isOverdue(task.dueDate) && task.status !== "DONE";
      $("#detail-content").html(`
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 sticky top-0 bg-white rounded-t-2xl z-10">
          <div class="flex items-center gap-3">
            ${priorityBadge(task.priority)}
            ${statusBadge(task.status)}
          </div>
          <div class="flex items-center gap-2">
            <button class="edit-task-btn px-3 py-1.5 rounded-xl bg-blue-50 text-blue-600 text-xs font-semibold hover:bg-blue-100 transition-colors" data-id="${task.id}">Edit</button>
            <button id="detail-close" class="p-2 rounded-xl hover:bg-slate-100 text-slate-400 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>

        <div class="p-6 space-y-6">
          <div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">${task.title || "Untitled"}</h2>
            <p class="text-slate-500 text-sm leading-relaxed">${task.description || "<span class='italic text-slate-300'>No description</span>"}</p>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-50 rounded-xl p-4">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Assigned To</p>
              <p class="text-sm font-semibold text-slate-700">${task.assignedTo ? (task.assignedTo.name || task.assignedTo.email) : "Unassigned"}</p>
            </div>
            <div class="bg-slate-50 rounded-xl p-4">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Due Date</p>
              <p class="text-sm font-semibold ${overdue ? "text-red-500" : "text-slate-700"}">${task.dueDate ? formatDate(task.dueDate) : "No due date"}</p>
            </div>
          </div>

          <!-- Status change -->
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Update Status</label>
            <div class="flex flex-wrap gap-2">
              ${["TODO", "IN_PROGRESS", "IN_REVIEW", "DONE"].map(s => `
                <button class="status-change-btn px-3 py-1.5 rounded-xl text-xs font-semibold border transition-all ${task.status === s ? "border-blue-500 bg-blue-50 text-blue-700" : "border-slate-200 text-slate-500 hover:border-blue-300 hover:text-blue-600"}" data-status="${s}" data-id="${task.id}">
                  ${s.replace("_", " ")}
                </button>
              `).join("")}
            </div>
          </div>

          <!-- Subtasks -->
          <div>
            <p class="text-sm font-semibold text-slate-700 mb-3">Subtasks (${(task.subtasks || []).length})</p>
            <div id="subtask-list" class="space-y-2 mb-3">
              ${(task.subtasks || []).length ? task.subtasks.map(s => `
                <label class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-50 cursor-pointer group">
                  <input type="checkbox" class="subtask-check" ${s.completed ? "checked" : ""} data-id="${s.id}" data-task-id="${task.id}" />
                  <span class="text-sm text-slate-600 ${s.completed ? "line-through text-slate-400" : ""} flex-1">${s.title}</span>
                </label>
              `).join("") : `<p class="text-slate-400 text-sm italic">No subtasks yet</p>`}
            </div>
            <div class="flex gap-2">
              <input type="text" id="new-subtask" placeholder="Add subtask..." class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 transition-all" />
              <button id="add-subtask-btn" data-task-id="${task.id}" class="px-4 py-2 bg-slate-100 hover:bg-blue-50 text-slate-600 hover:text-blue-600 rounded-xl text-sm font-medium transition-colors">Add</button>
            </div>
          </div>

          <!-- Comments -->
          <div>
            <p class="text-sm font-semibold text-slate-700 mb-3">Comments (${(task.comments || []).length})</p>
            <div class="space-y-3 mb-4" id="comment-list">
              ${(task.comments || []).map(c => `
                <div class="flex gap-3">
                  <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${(c.user?.name || c.user?.email || "?").substring(0, 2).toUpperCase()}</div>
                  <div class="flex-1 bg-slate-50 rounded-xl p-3">
                    <p class="text-xs font-semibold text-slate-600 mb-1">${c.user?.name || c.user?.email || "User"}</p>
                    <p class="text-sm text-slate-600">${c.content}</p>
                  </div>
                </div>
              `).join("") || `<p class="text-slate-400 text-sm italic">No comments yet. Be the first!</p>`}
            </div>
            <div class="flex gap-2">
              <input type="text" id="new-comment" placeholder="Write a comment..." class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 transition-all" />
              <button id="add-comment-btn" data-task-id="${task.id}" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-medium transition-colors">Post</button>
            </div>
          </div>
        </div>
      `);

      // Close detail
      $("#detail-close").on("click", () => $("#detail-modal").addClass("hidden").removeClass("flex"));

      // Edit task
      $(".edit-task-btn").on("click", function () {
        $("#detail-modal").addClass("hidden").removeClass("flex");
        // Populate form
        $("#task-modal-title").text("Edit Task");
        $("#task-id").val(task.id);
        $("#task-title").val(task.title);
        $("#task-desc").val(task.description);
        $("#task-priority").val(task.priority);
        $("#task-status").val(task.status);
        $("#task-assignee").val(task.assignedTo?.id || "");
        $("#task-due").val(task.dueDate ? task.dueDate.substring(0, 10) : "");
        $("#task-submit").text("Save Changes");
        $("#task-modal").removeClass("hidden").addClass("flex");
      });

      // Status change
      $(".status-change-btn").on("click", function () {
        const status = $(this).data("status");
        const id = $(this).data("id");
        API.put("/tasks/" + id + "/status", { status }).then(function () {
          Toast.show("Status updated!", "success");
          const task = allTasks.find(t => String(t.id) === String(id));
          if (task) task.status = status;
          applyFilters();
          openTaskDetail(id);
        });
      });

      // Add subtask
      $("#add-subtask-btn").on("click", function () {
        const title = $("#new-subtask").val().trim();
        const tid = $(this).data("task-id");
        if (!title) return;
        API.post("/tasks/" + tid + "/subtasks", { title }).then(function () {
          Toast.show("Subtask added!", "success");
          openTaskDetail(tid);
        });
      });

      // Add comment
      $("#add-comment-btn").on("click", function () {
        const content = $("#new-comment").val().trim();
        const tid = $(this).data("task-id");
        if (!content) return;
        API.post("/tasks/" + tid + "/comments", { content }).then(function () {
          Toast.show("Comment posted!", "success");
          openTaskDetail(tid);
        });
      });
    }

    $(document).on("change", ".subtask-check", function () {
      const subtaskId = $(this).data("id");
      const isCompleted = $(this).is(":checked");

      const $text = $(this).closest("label").find("span");
      $text.toggleClass("line-through text-slate-400", isCompleted);
      $(this).prop("disabled", true);

      // API call
      API.put(`/tasks/subtask/${subtaskId}/${isCompleted}`)
        .then(function (res) {
          Toast.show("Subtask updated successfully", "success");
          $(this).prop("disabled", false);
          
          // Optional: update UI (strike-through etc already handled by reload or manually)
        })
        .catch(function (err) {
          Toast.show("Failed to update subtask", "error");

          $text.toggleClass("line-through text-slate-400", isCompleted);

          // ❗ Revert checkbox if API fails
          $(this).prop("checked", !isCompleted);
          $(this).prop("disabled", false);
        }.bind(this));
         $(this).prop("disabled", false);
    });

    $("#detail-modal").on("click", function (e) { if ($(e.target).is(this)) $(this).addClass("hidden").removeClass("flex"); });

    loadTasks();
  </script>
</body>

</html>
