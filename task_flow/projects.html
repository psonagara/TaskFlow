<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="app"></div>

  <!-- Create Project Modal -->
  <div id="project-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4 modal-backdrop">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md modal-card">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="font-bold text-slate-800 text-lg">Create Project</h2>
        <button id="modal-close" class="p-2 rounded-xl hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="project-form" class="p-6 space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Project Name <span class="text-red-500">*</span></label>
          <input type="text" id="proj-name" placeholder="e.g. Marketing Website"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all" />
          <p class="text-red-500 text-xs mt-1 hidden" id="proj-name-err">Project name is required.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
          <textarea id="proj-desc" rows="3" placeholder="Brief project description..."
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-all resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="modal-cancel" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</button>
          <button type="submit" id="proj-submit" class="flex-1 px-4 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold transition-colors flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Create Project
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error("unauth");

    const { sidebarHtml, topbarHtml } = renderLayout("projects");
    $("#app").html(`
      ${sidebarHtml}
      <div class="lg:ml-64 flex flex-col min-h-screen">
        ${topbarHtml}
        <main class="flex-1 p-4 lg:p-8">
          <div class="flex items-center justify-between mb-8 fade-in">
            <div>
              <h1 class="text-2xl font-bold text-slate-800">Projects</h1>
              <p class="text-slate-500 text-sm mt-0.5">Manage all your projects</p>
            </div>
            <button id="create-project-btn" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition-all shadow-md shadow-blue-600/20 hover:shadow-lg">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              New Project
            </button>
          </div>

          <!-- Search -->
          <div class="mb-6 fade-in">
            <div class="relative max-w-xs">
              <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="text" id="search-projects" placeholder="Search projects..."
                class="w-full border border-slate-200 bg-white rounded-xl pl-10 pr-4 py-2.5 text-sm focus:border-blue-400 transition-all" />
            </div>
          </div>

          <!-- Grid -->
          <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            <!-- skeleton -->
            ${[1,2,3,4].map(() => `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 animate-pulse h-40"></div>`).join("")}
          </div>
        </main>
      </div>
    `);

    initSidebar();
    initUserNav();

    const COLORS = ["from-blue-500 to-blue-600","from-violet-500 to-violet-600","from-emerald-500 to-emerald-600","from-amber-500 to-orange-500","from-pink-500 to-rose-500","from-cyan-500 to-teal-500"];
    let allProjects = [];

    function loadProjects() {
      API.get("/projects").then(function(res) {
        allProjects = res.content.projects || res || [];
        renderProjects(allProjects);
      }).catch(() => {
        $("#projects-grid").html(emptyState("Failed to load projects", "Check your connection and try again"));
      });
    }

    function renderProjects(projects) {
      const $grid = $("#projects-grid").empty();
      if (!projects.length) {
        $grid.html(`<div class="col-span-full">${emptyState("No projects found", 'Click "New Project" to create your first one')}</div>`);
        return;
      }
      projects.forEach(function(p, i) {
        const color = COLORS[i % COLORS.length];
        const initial = (p.name || "P").charAt(0).toUpperCase();
        $grid.append(`
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 overflow-hidden group fade-in">
            <div class="h-2 bg-gradient-to-r ${color}"></div>
            <div class="p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 bg-gradient-to-br ${color} rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-md">
                  ${initial}
                </div>
                <div class="relative">
                  <button class="proj-menu-btn p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors" data-id="${p.id}">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                  </button>
                </div>
              </div>
              <a href="board.html?projectId=${p.id}" class="block">
                <h3 class="font-bold text-slate-800 group-hover:text-blue-600 transition-colors mb-1 truncate">${p.name || "Untitled"}</h3>
                <p class="text-slate-400 text-xs line-clamp-2 leading-relaxed">${p.description || "No description provided"}</p>
                <div class="flex items-center gap-2 mt-4 pt-4 border-t border-slate-100">
                  <span class="text-xs text-slate-400 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
                    View Board
                  </span>
                  <div class="flex-1"></div>
                  <svg class="w-4 h-4 text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </div>
              </a>
            </div>
          </div>
        `);
      });
    }

    // Search
    $("#search-projects").on("input", function() {
      const q = $(this).val().toLowerCase();
      renderProjects(allProjects.filter(p => (p.name||"").toLowerCase().includes(q) || (p.description||"").toLowerCase().includes(q)));
    });

    // Modal open/close
    $("#create-project-btn").on("click", () => { $("#project-modal").removeClass("hidden").addClass("flex"); $("#proj-name").focus(); });
    $("#modal-close, #modal-cancel").on("click", () => { $("#project-modal").addClass("hidden").removeClass("flex"); });
    $("#project-modal").on("click", function(e) { if ($(e.target).is("#project-modal")) { $(this).addClass("hidden").removeClass("flex"); } });

    // Submit
    $("#project-form").on("submit", function(e) {
      e.preventDefault();
      const name = $("#proj-name").val().trim();
      if (!name) { $("#proj-name-err").removeClass("hidden"); return; }
      $("#proj-name-err").addClass("hidden");

      const btn = $("#proj-submit").prop("disabled", true).html(`<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Creating...`);

      API.post("/projects", { name, description: $("#proj-desc").val().trim() }).then(function() {
        Toast.show("Project created successfully!", "success");
        $("#project-modal").addClass("hidden").removeClass("flex");
        $("#proj-name").val(""); $("#proj-desc").val("");
        loadProjects();
      }).catch(() => {}).always(() => {
        btn.prop("disabled", false).html(`<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Create Project`);
      });
    });

    loadProjects();
  </script>
</body>
</html>
