<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.12); }
    .input-field { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; }
    .input-field::placeholder { color: rgba(255,255,255,0.4); }
    .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 py-10">
  <div class="grid-bg"></div>
  <div class="fixed top-20 right-1/4 w-72 h-72 bg-indigo-600/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="fixed bottom-20 left-1/4 w-64 h-64 bg-blue-600/15 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/40">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <span class="text-2xl font-bold text-white tracking-tight">TaskFlow</span>
      </div>
      <p class="text-slate-400 text-sm">Create your account to get started</p>
    </div>

    <div class="glass rounded-2xl p-8 shadow-2xl">
      <h1 class="text-xl font-bold text-white mb-6">Create account</h1>

      <form id="register-form" novalidate>
        <!-- Name -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Full Name</label>
          <input type="text" id="name" placeholder="John Doe"
            class="input-field w-full rounded-xl px-4 py-3 text-sm transition-all duration-200" />
          <p class="text-red-400 text-xs mt-1 hidden err" id="name-err">Name is required.</p>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email address</label>
          <input type="email" id="email" placeholder="you@example.com"
            class="input-field w-full rounded-xl px-4 py-3 text-sm transition-all duration-200" />
          <p class="text-red-400 text-xs mt-1 hidden" id="email-err">Please enter a valid email.</p>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters"
            class="input-field w-full rounded-xl px-4 py-3 text-sm transition-all duration-200" />
          <p class="text-red-400 text-xs mt-1 hidden" id="password-err">Password must be at least 6 characters.</p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat password"
            class="input-field w-full rounded-xl px-4 py-3 text-sm transition-all duration-200" />
          <p class="text-red-400 text-xs mt-1 hidden" id="confirm-err">Passwords do not match.</p>
        </div>

        <!-- Password strength -->
        <div class="mb-6 -mt-4">
          <div class="flex gap-1 h-1">
            <div class="strength-bar flex-1 rounded-full bg-slate-700 transition-all duration-300" id="s1"></div>
            <div class="strength-bar flex-1 rounded-full bg-slate-700 transition-all duration-300" id="s2"></div>
            <div class="strength-bar flex-1 rounded-full bg-slate-700 transition-all duration-300" id="s3"></div>
            <div class="strength-bar flex-1 rounded-full bg-slate-700 transition-all duration-300" id="s4"></div>
          </div>
          <p class="text-slate-400 text-xs mt-1" id="strength-label"></p>
        </div>

        <button type="submit" id="register-btn"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-blue-600/30">
          <span>Create Account</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </button>
      </form>

      <p class="text-center text-sm text-slate-400 mt-6">
        Already have an account?
        <a href="index.html" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Sign in</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (Auth.getToken()) window.location.href = "dashboard.html";

    // Password strength
    $("#password").on("input", function () {
      const val = $(this).val();
      const bars = ["#s1","#s2","#s3","#s4"];
      bars.forEach(b => $(b).css("background","#334155"));
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;
      const colors = ["#ef4444","#f59e0b","#3b82f6","#10b981"];
      const labels = ["Weak","Fair","Good","Strong"];
      for (let i = 0; i < strength; i++) $(bars[i]).css("background", colors[strength-1]);
      $("#strength-label").text(strength > 0 ? labels[strength-1] : "");
    });

    // Submit
    $("#register-form").on("submit", function (e) {
      e.preventDefault();
      let valid = true;

      const name = $("#name").val().trim();
      const email = $("#email").val().trim();
      const password = $("#password").val().trim();
      const confirm = $("#confirm-password").val().trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!name) { $("#name-err").removeClass("hidden"); valid = false; }
      else { $("#name-err").addClass("hidden"); }

      if (!email || !emailRe.test(email)) { $("#email-err").removeClass("hidden"); valid = false; }
      else { $("#email-err").addClass("hidden"); }

      if (!password || password.length < 6) { $("#password-err").removeClass("hidden"); valid = false; }
      else { $("#password-err").addClass("hidden"); }

      if (password !== confirm) { $("#confirm-err").removeClass("hidden"); valid = false; }
      else { $("#confirm-err").addClass("hidden"); }

      if (!valid) return;

      const btn = $("#register-btn");
      btn.prop("disabled", true).html(`<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span>Creating...</span>`);

      $.ajax({
        url: BASE_URL + "/auth/register",
        method: "POST",
        contentType: "application/json",
        data: JSON.stringify({ name, email, password }),
        success: function () {
          Toast.show("Account created! Please sign in.", "success");
          setTimeout(() => (window.location.href = "index.html"), 1200);
        },
        error: function (xhr) {
          const msg = xhr.responseJSON?.message || "Registration failed.";
          Toast.show(msg, "error");
          btn.prop("disabled", false).html(`<span>Create Account</span>`);
        },
      });
    });
  </script>
</body>
</html>
